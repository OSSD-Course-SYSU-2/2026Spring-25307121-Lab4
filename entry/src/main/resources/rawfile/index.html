<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Delta修复 - 响应式数织游戏">
    <title>Delta修复</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景音乐 -->
    <audio id="bgm" loop preload="auto">
        <source src="bgm_aoi.mp3" type="audio/mpeg">
    </audio>
    
    <!-- 音乐控制按钮 -->
    <button id="music-btn" class="music-btn" onclick="toggleMusic()">
        <span id="music-icon">●</span>
    </button>
    
    <div class="container">
        <!-- 标题区域 -->
        <header class="header">
            <h1 class="title">Delta修复</h1>
            <div class="level-info">
                <span id="level-text">关卡 1 / 3</span>
                <span id="steps-text">步数: 0</span>
            </div>
        </header>

        <!-- 游戏主区域 -->
        <main class="game-area">
            <!-- 数织界面 -->
            <section id="nonogram-section" class="game-section active">
                <div class="hint-text">← 左右滑动查看完整网格 →</div>
                
                <div class="grid-container">
                    <!-- 列提示 -->
                    <div class="column-hints" id="column-hints"></div>
                    
                    <!-- 行提示和网格 -->
                    <div class="row-grid-wrapper">
                        <div class="row-hints" id="row-hints"></div>
                        <div class="grid" id="grid"></div>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-reset" onclick="resetGame()">重置</button>
                    <button class="btn btn-check" onclick="checkSolution()">检查</button>
                    <button class="btn btn-next" onclick="nextLevel()">下一关</button>
                    <button class="btn btn-style" onclick="switchStyle()">切换风格</button>
                </div>

                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color filled"></div>
                        <span>已填充</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color empty"></div>
                        <span>空白</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color marked"></div>
                        <span>标记X</span>
                    </div>
                </div>
            </section>

            <!-- 拼图界面 -->
            <section id="puzzle-section" class="game-section">
                <h2 class="section-title">拼图填充</h2>
                <p class="section-desc">用拼图模块填充数织完成的区域</p>
                <div class="progress-text" id="puzzle-progress">已放置: 0 / 0 格</div>

                <div class="puzzle-grid" id="puzzle-grid"></div>

                <div class="puzzle-pieces" id="puzzle-pieces"></div>

                <div class="controls">
                    <button class="btn btn-reset" onclick="resetPuzzle()">重置拼图</button>
                    <button class="btn btn-check" onclick="checkPuzzleComplete()">检查完成</button>
                </div>
            </section>

            <!-- 通关界面 -->
            <section id="completion-section" class="game-section">
                <div class="completion-content">
                    <h2 class="completion-title">恭喜通关！</h2>
                    <p class="completion-subtitle">你已完成所有关卡</p>
                    
                    <div class="link-box">
                        <p>点击下方链接继续</p>
                        <a href="https://www.bilibili.com/video/BV1GJ411x7h7/?spm_id_from=333.337.search-card.all.click&vd_source=e5580fb76b526ee1925ecea3e8af8070" 
                           target="_blank" 
                           class="link">
                            https://www.bilibili.com/video/BV1GJ411x7h7/
                        </a>
                    </div>

                    <button class="btn btn-restart" onclick="restartGame()">重新开始</button>
                </div>
            </section>
        </main>

        <!-- 提示信息 -->
        <div class="toast" id="toast"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
